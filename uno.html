<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="uno.css">
    <title>UNO Card Types</title>
</head>
<body>
    <h1>UNO Card Types</h1>
    <div class="card-container">
        <div class="card color red">Red 1</div>
        <div class="card color red">Red 2</div>
        <div class="card color red">Red 3</div>
        <div class="card color red">Red 4</div>
        <div class="card color blue">Blue 1</div>
        <div class="card color blue">Blue 2</div>
        <div class="card color blue">Blue 3</div>
        <div class="card color blue">Blue 4</div>
        <div class="card color green">Green 1</div>
        <div class="card color green">Green 2</div>
        <div class="card color green">Green 3</div>
        <div class="card color green">Green 4</div>
        <div class="card color yellow">Yellow 1</div>
        <div class="card color yellow">Yellow 2</div>
        <div class="card color yellow">Yellow 3</div>
        <div class="card color yellow">Yellow 4</div>
        <div class="card action plus2">+2 Card</div>
        <div class="card action plus4">+4 Card</div>
        <div class="card action block">Block Card</div>
        <div class="card action reverse">Reverse Card</div>
        <div class="card back">Back of Deck</div>
    </div>
</body>
</html>
